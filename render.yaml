# Render Blueprint — SAARMedTec (Vite + React static site)
# Render ignores Netlify's public/_redirects, so the SPA rewrite is defined here.
services:
  - type: web
    name: saarmedtec
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
